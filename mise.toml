[tools]
bun = "1.3.1"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.typecheck]
description = "Type-check the project"
run = "bun x tsc --noEmit"

[tasks."build:client"]
description = "Build the client bundle"
run = "bun build src/client/index.html --outdir dist"

[tasks.dev]
description = "Start the wrangler dev server"
depends = ["build:client"]
run = "wrangler dev"

[tasks.deploy]
description = "Build client and deploy via wrangler"
depends = ["build:client"]
run = "wrangler deploy"

[tasks."cf-typegen"]
description = "Regenerate Cloudflare worker env types from wrangler config"
run = "wrangler types"
